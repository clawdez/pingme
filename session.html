<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>pingme — session</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#F4EDDC"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { padding: 18px 18px 60px; font-family: 'Space Grotesk', system-ui, sans-serif; }

  .top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .wordmark { font-family: 'Permanent Marker', cursive; font-size: 26px; transform: rotate(-2deg); letter-spacing: .3px; }
  .back { font-size: 12px; color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--muted); }

  h1 { font-family: 'Permanent Marker', cursive; font-size: 30px; margin: 14px 0 2px; letter-spacing: .3px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; font-weight: 600; }

  .vibe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .vibe {
    background: var(--cream); border: 2.5px solid var(--ink); border-radius: 12px;
    padding: 14px 12px; box-shadow: 3px 3px 0 var(--ink); cursor: pointer;
    text-align: left; font-family: inherit;
  }
  .vibe:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .vibe.selected { background: var(--straw); }
  .vibe .label { font-weight: 700; font-size: 15px; display: block; }
  .vibe .desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.35; }

  .suggest {
    background: var(--cobalt); color: var(--cream);
    border: 2.5px solid var(--ink); border-radius: 14px;
    padding: 16px; box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 22px;
  }
  .suggest .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: .8; margin-bottom: 6px; }
  .suggest h3 { font-family: 'Permanent Marker', cursive; font-size: 22px; margin: 0 0 6px; font-weight: 400; }
  .suggest .why { font-size: 13px; opacity: .85; line-height: 1.4; margin-bottom: 12px; }
  .suggest-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; background: var(--ink); color: var(--cream); border: 2.5px solid var(--ink);
    border-radius: 10px; padding: 10px; font-weight: 700; font-size: 13px;
    box-shadow: 3px 3px 0 var(--ink); cursor: pointer; font-family: inherit;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .suggest .btn { background: var(--cream); color: var(--ink); }
  .suggest .btn.skip { background: transparent; color: var(--cream); border-color: var(--cream); box-shadow: 3px 3px 0 rgba(244,237,220,.5); }

  .tables { display: flex; flex-direction: column; gap: 10px; }
  .table-card {
    background: var(--cream); border: 2.5px solid var(--ink); border-radius: 12px;
    padding: 12px 14px; box-shadow: 3px 3px 0 var(--ink);
  }
  .table-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .table-name { font-family: 'Permanent Marker', cursive; font-size: 18px; }
  .table-status {
    font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 2px solid var(--ink);
    font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  }
  .status-live { background: var(--sage); }
  .status-open { background: var(--peach); }
  .players { font-size: 13px; color: var(--muted); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-row">
  <div class="wordmark">ping<span style="color:var(--flame)">me</span></div>
  <a class="back" href="index.html">back</a>
</div>

<h1>session</h1>
<div class="sub" id="ctx-sub">Mozart's — 3 tables, 7 people here</div>

<section id="vibe-step">
  <p class="section-label">pick your vibe</p>
  <div class="vibe-grid">
    <button class="vibe" data-vibe="chill">
      <span class="label">just chilling</span>
      <span class="desc">play whoever, no ranking</span>
    </button>
    <button class="vibe" data-vibe="real">
      <span class="label">play for real</span>
      <span class="desc">ranked, stats count</span>
    </button>
    <button class="vibe" data-vibe="friends">
      <span class="label">with friends</span>
      <span class="desc">private, no randos</span>
    </button>
    <button class="vibe" data-vibe="open">
      <span class="label">open to anything</span>
      <span class="desc">let the app pick</span>
    </button>
  </div>
</section>

<section id="active-step" class="hidden">
  <div id="suggest-card" class="suggest hidden">
    <div class="label">suggested match</div>
    <h3 id="sg-text">—</h3>
    <p class="why" id="sg-why">—</p>
    <div class="suggest-actions">
      <button class="btn" id="sg-accept">i'm down</button>
      <button class="btn skip" id="sg-skip">skip</button>
    </div>
  </div>

  <p class="section-label">tables here</p>
  <div class="tables" id="tables"></div>
</section>

<script>
const STATE = {
  me: { name: 'you', skill: 'mid', vibe: null },
  tables: [
    { id: 1, name: 'Table 1', players: [{ name: 'Marcus', skill: 'high' }, { name: 'Sam', skill: 'low' }], status: 'live' },
    { id: 2, name: 'Table 2', players: [{ name: 'Jess', skill: 'high' }, { name: 'Diego', skill: 'low' }], status: 'live' },
    { id: 3, name: 'Table 3', players: [], status: 'open' }
  ],
  queue: [
    { name: 'Priya', skill: 'mid', vibe: 'real' },
    { name: 'Tomás', skill: 'mid', vibe: 'open' }
  ]
};

function suggestMatch() {
  const me = STATE.me;
  if (!me.vibe || me.vibe === 'friends') return null;
  const rank = { low: 1, mid: 2, high: 3 };

  for (const t of STATE.tables) {
    if (t.players.length !== 2) continue;
    const diff = Math.abs(rank[t.players[0].skill] - rank[t.players[1].skill]);
    if (diff >= 2 && me.vibe !== 'chill') {
      const high = t.players.find(p => p.skill === 'high');
      if (high && rank[me.skill] >= 2) {
        return { text: `play ${high.name}`, why: `${high.name} is mismatched on ${t.name} — closer to your level`, tableId: t.id, opponent: high.name };
      }
    }
  }

  const fit = STATE.queue.find(q => q.vibe === me.vibe && q.skill === me.skill);
  if (fit) {
    const open = STATE.tables.find(t => t.status === 'open');
    return { text: `play ${fit.name}`, why: `same vibe, same level — ${open ? open.name : 'next open table'}`, tableId: open?.id, opponent: fit.name };
  }

  const open = STATE.tables.find(t => t.status === 'open');
  if (open) return { text: `grab ${open.name}`, why: `it's open — call your shot`, tableId: open.id, opponent: null };
  return { text: 'all tables busy', why: 'hang tight, you\'re in the queue', tableId: null };
}

function renderTables() {
  document.getElementById('tables').innerHTML = STATE.tables.map(t => {
    const players = t.players.length
      ? t.players.map(p => p.name).join(' vs ')
      : 'empty';
    return `
      <div class="table-card">
        <div class="table-head">
          <span class="table-name">${t.name}</span>
          <span class="table-status status-${t.status}">${t.status}</span>
        </div>
        <div class="players">${players}</div>
      </div>`;
  }).join('');
}

function renderSuggestion() {
  const s = suggestMatch();
  const card = document.getElementById('suggest-card');
  if (!s) { card.classList.add('hidden'); return; }
  card.classList.remove('hidden');
  document.getElementById('sg-text').textContent = s.text;
  document.getElementById('sg-why').textContent = s.why;
  card._s = s;
}

function enterActive() {
  document.getElementById('vibe-step').classList.add('hidden');
  document.getElementById('active-step').classList.remove('hidden');
  renderTables();
  renderSuggestion();
}

document.querySelectorAll('.vibe').forEach(v => v.onclick = () => {
  STATE.me.vibe = v.dataset.vibe;
  enterActive();
});

document.getElementById('sg-accept').onclick = () => {
  const s = document.getElementById('suggest-card')._s;
  if (s.opponent && s.tableId) {
    const t = STATE.tables.find(x => x.id === s.tableId);
    t.players = [{ name: 'you', skill: STATE.me.skill }, { name: s.opponent, skill: 'mid' }];
    t.status = 'live';
    STATE.queue = STATE.queue.filter(q => q.name !== s.opponent);
  }
  renderTables();
  document.getElementById('suggest-card').classList.add('hidden');
};

document.getElementById('sg-skip').onclick = () => {
  document.getElementById('suggest-card').classList.add('hidden');
};
</script>
</body>
</html>
