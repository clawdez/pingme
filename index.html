<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>pingme — see who's playing</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#F4EDDC"/>
<meta name="description" content="See who's playing ping pong right now. Signal you're down. Find your game."/>
<meta property="og:title" content="pingme"/>
<meta property="og:description" content="See who's playing ping pong right now. Signal you're down. Find your game."/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="pingme"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Permanent+Marker&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script defer src="app.js"></script>
<script>
// Register service worker for push notifications + offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.error('SW registration failed:', e));
}
</script>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
<defs>
  <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="t"/>
    <feDisplacementMap in="SourceGraphic" in2="t" scale="1.4"/>
  </filter>
  <pattern id="netMesh" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="4" stroke="#F4EDDC" stroke-width=".6" opacity=".7"/>
    <line x1="0" y1="0" x2="4" y2="0" stroke="#F4EDDC" stroke-width=".6" opacity=".7"/>
  </pattern>
</defs>
</svg>

<div id="app" data-home-state="off">

  <!-- HOME -->
  <div class="screen active" data-screen="home">

    <!-- top bar: wordmark + avatar (opens combined panel) -->
    <div class="top">
      <div class="wordmark">ping<span class="me">me!</span></div>
      <div class="top-actions">
        <button class="share-btn" id="top-share" title="share pingme"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
        <button class="profile-av" id="profile-av">?<span class="av-badge" id="notis-badge" style="display:none">0</span><span class="av-dot" id="link-email-dot" style="display:none"></span></button>
      </div>
    </div>

    <!-- THE TABLE: the focal point -->
    <div class="court-card">
      <span class="court-eyebrow">tap or drag &rarr;</span>
      <div class="court-wrap" id="court-wrap">
        <svg class="court-svg" viewBox="0 0 340 168" preserveAspectRatio="none">
          <g>
            <ellipse cx="170" cy="156" rx="140" ry="5" fill="rgba(20,18,16,.18)"/>
            <path d="M 56 50 L 284 50 L 298 130 L 42 130 Z" fill="var(--table)" stroke="#141210" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M 62 55 L 278 55 L 290 125 L 50 125 Z" fill="none" stroke="#F4EDDC" stroke-width="1.4" opacity=".65"/>
            <line x1="49" y1="90" x2="291" y2="90" stroke="#F4EDDC" stroke-width="1" stroke-dasharray="5 3" opacity=".55"/>
            <path d="M 56 50 L 284 50 L 282 55 L 58 55 Z" fill="rgba(20,18,16,.2)"/>
            <g>
              <rect x="166" y="44" width="3" height="10" fill="#141210"/>
              <rect x="171" y="128" width="3" height="10" fill="#141210"/>
              <path d="M 168 46 L 175 46 L 175 130 L 168 130 Z" fill="url(#netMesh)" stroke="#141210" stroke-width="1.5"/>
              <path d="M 167 44 L 176 44 L 176 48 L 167 48 Z" fill="#F4EDDC" stroke="#141210" stroke-width="1"/>
            </g>
            <!-- LEFT PADDLE (cobalt / down) -->
            <g transform="translate(28, 90)">
              <g class="paddle left-paddle" id="left-paddle">
                <rect x="-22" y="-4" width="26" height="10" rx="3" fill="var(--handle)" stroke="#141210" stroke-width="2.2" transform="rotate(-22 -9 1)"/>
                <rect x="-18" y="-3" width="2" height="8" fill="#141210" opacity=".5" transform="rotate(-22 -9 1)"/>
                <rect x="-10" y="-3" width="2" height="8" fill="#141210" opacity=".5" transform="rotate(-22 -9 1)"/>
                <ellipse cx="14" cy="0" rx="20" ry="23" fill="var(--cobalt)" stroke="#141210" stroke-width="2.5"/>
                <ellipse cx="14" cy="0" rx="14" ry="17" fill="none" stroke="#F4EDDC" stroke-width="1" stroke-dasharray="1.5 3" opacity=".55"/>
                <path d="M 4 -10 Q 8 -22 18 -22" stroke="#F4EDDC" stroke-width="1.5" fill="none" opacity=".45"/>
              </g>
            </g>
            <!-- RIGHT PADDLE (flame / playing) -->
            <g transform="translate(312, 90)">
              <g class="paddle right-paddle" id="right-paddle">
                <rect x="-4" y="-4" width="26" height="10" rx="3" fill="var(--handle)" stroke="#141210" stroke-width="2.2" transform="rotate(22 9 1)"/>
                <rect x="2" y="-3" width="2" height="8" fill="#141210" opacity=".5" transform="rotate(22 9 1)"/>
                <rect x="10" y="-3" width="2" height="8" fill="#141210" opacity=".5" transform="rotate(22 9 1)"/>
                <ellipse cx="-14" cy="0" rx="20" ry="23" fill="var(--flame)" stroke="#141210" stroke-width="2.5"/>
                <ellipse cx="-14" cy="0" rx="14" ry="17" fill="none" stroke="#F4EDDC" stroke-width="1" stroke-dasharray="1.5 3" opacity=".55"/>
                <path d="M -24 -10 Q -20 -22 -10 -22" stroke="#F4EDDC" stroke-width="1.5" fill="none" opacity=".45"/>
              </g>
            </g>
          </g>
        </svg>
        <!-- draggable ball -->
        <div class="ball at-rest" id="ball" style="left: 50%;">
          <div class="ball-shadow"></div>
          <div class="ball-core"></div>
        </div>
        <!-- live timer overlay (visible when playing) -->
        <div class="court-timer" id="court-timer"></div>
      </div>
      <div class="court-labels">
        <button class="c-lbl left" data-state="down"><span>down</span><span class="hint">free to play</span></button>
        <button class="c-lbl middle" data-state="off"><span>away</span><span class="hint-mid">not playing</span></button>
        <button class="c-lbl right" data-state="playing"><span>playing</span><span class="hint">at the table</span></button>
      </div>
    </div>

    <!-- the table (calling screen integrates here when down) -->
    <div class="the-table" id="the-table">
      <div class="table-head">
        <span class="table-title"><svg class="tt-icon" width="24" height="24" viewBox="0 0 40 40" filter="url(#wobble)"><path d="M26 4 C 34 5 38 14 36 22 C 34 30 26 34 18 31 C 16 32 14 34 13 36 C 12 38 10 38 9 37 C 8 36 9 34 11 33 C 13 32 14 30 14 28 C 10 24 9 16 12 10 C 15 4 21 2 26 4 Z" fill="#E8502A" stroke="#141210" stroke-width="2"/><circle cx="30" cy="12" r="2.6" fill="#F4EDDC" stroke="#141210" stroke-width="1.2"/></svg> ping pong</span>
        <span class="table-sub" id="table-sub">2 playing · 3 down</span>
      </div>
      <div class="table-sections">
        <div class="table-section" id="section-playing">
          <div class="section-label playing-label"><span class="s-dot green"></span> playing <span class="section-count" id="count-playing"></span></div>
          <div class="section-list" id="list-playing"></div>
        </div>
        <div class="table-section" id="section-down">
          <div class="section-label down-label"><span class="s-dot yellow"></span> down <span class="section-count" id="count-down"></span></div>
          <div class="section-list" id="list-down"></div>
        </div>
        <div class="table-section" id="section-off">
          <div class="section-label off-label"><span class="s-dot gray"></span> away <span class="section-count" id="count-off"></span></div>
          <div class="section-list" id="list-off"></div>
        </div>
      </div>
      <!-- Referral leaderboard (collapsed by default) -->
      <div class="table-section" id="section-leaderboard" style="display:none">
        <button class="section-label lb-label lb-toggle" id="lb-toggle">&#127942; top recruiters <span class="lb-arrow" id="lb-arrow">&#9654;</span></button>
        <div class="lb-list lb-collapsed" id="lb-list"></div>
      </div>

      <div class="empty-roster" id="empty-roster" style="display:none">
        <div class="empty-roster-icon">&#127955;</div>
        <div class="empty-roster-text">no one's here yet</div>
        <div class="empty-roster-sub">share the link &amp; rally the squad</div>
      </div>
    </div>

  </div>

  <!-- CENTERED MODALS -->

  <!-- Ping confirm -->
  <div class="sheet-wrap" id="sheet-ping-confirm">
    <div class="sheet-scrim" data-dismiss></div>
    <div class="modal-center">
      <button class="modal-close" data-dismiss>&times;</button>
      <h3>rally the table?</h3>
      <div class="ping-confirm-sub">everyone gets a ping that you're down to play</div>
      <div class="venue-picker" id="venue-picker"></div>
      <button class="ping-confirm-btn" id="confirm-ping">serve it up</button>
    </div>
  </div>

  <!-- Player profile modal -->
  <div class="sheet-wrap" id="sheet-raider">
    <div class="sheet-scrim" data-dismiss></div>
    <div class="modal-center"><button class="modal-close" data-dismiss>&times;</button></div>
  </div>

  <!-- Combined profile + notis modal -->
  <div class="sheet-wrap" id="sheet-me">
    <div class="sheet-scrim" data-dismiss></div>
    <div class="modal-center modal-tall">
      <div class="me-wrap" id="me-wrap"></div>
      <div class="me-notis-section" id="me-notis-section">
        <div class="me-rule"></div>
        <div class="me-notis-head">
          <span class="me-notis-title">notis</span>
          <span class="notis-sub" id="notis-sub"></span>
        </div>
        <div class="ping-list" id="ping-list"></div>
      </div>
    </div>
  </div>

  <!-- QR share modal -->
  <div class="sheet-wrap" id="sheet-qr">
    <div class="sheet-scrim" data-dismiss></div>
    <div class="modal-center">
      <button class="modal-close" data-dismiss>&times;</button>
      <h3>share pingme</h3>
      <div class="qr-wrap" id="qr-canvas-wrap"></div>
      <div class="qr-share-actions">
        <button class="qr-action-btn" id="qr-copy">copy link</button>
        <button class="qr-action-btn qr-share-native" id="qr-share-native" style="display:none">share link</button>
      </div>
    </div>
  </div>


</div>

<div id="setup-root"></div>
<div class="toast" id="toast"></div>

<!-- Loading splash — shown instantly, hidden by app.js when ready -->
<div id="splash" style="position:fixed;inset:0;z-index:999;background:#F4EDDC;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Permanent Marker',cursive,system-ui,sans-serif">
  <div style="font-size:32px;color:#141210;letter-spacing:-1px">ping<span style="color:#E8502A">me!</span></div>
  <div style="margin-top:12px;width:28px;height:28px;border:3px solid #e0d8c8;border-top-color:#E8502A;border-radius:50%;animation:sp .7s linear infinite"></div>
  <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
</div>

</body>
</html>
