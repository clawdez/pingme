<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PingMe" />
  <title>PingMe 🏓</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME -->
  <div id="screen-home" class="screen active"></div>

  <!-- PLAY -->
  <div id="screen-play" class="screen"></div>

  <!-- WAITING -->
  <div id="screen-waiting" class="screen"></div>

  <!-- PROFILE -->
  <div id="screen-profile" class="screen"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-nav="home" onclick="location.hash='#home'">
      🏠 <span>Home</span>
    </button>
    <button class="nav-btn" data-nav="play" onclick="location.hash='#play'">
      🏓 <span>Play</span>
    </button>
    <button class="nav-btn" data-nav="profile" onclick="location.hash='#profile'">
      👤 <span>Profile</span>
    </button>
  </nav>

  <!-- TOAST -->
  <div class="toast"></div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- APP -->
  <script src="app.js"></script>
</body>
</html>
